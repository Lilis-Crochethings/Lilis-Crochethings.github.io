description: |-
  I made these with mixed fibers from Alison and Mae. I didn't know what 'mixed fibers' meant, but when I saw the yarn, I knew I wanted to make a coaster with it... A big one.
  I first tested it with a small piece of yarn to see if it could withstand heat and it did. I wanted to check if 'mixed fibers' also meant some type of plastic. Which if you expose it to heat, would melt. But luckily for me, it didn't! So now I have beautiful heat resistant coasters for my hot pans. 

  The yarn is really sturdy, so pretty hard to crochet with. So halfway through the coaster your wrists will hurt.

  I altered the pattern a bit, because otherwise the coaster would be too big, since my yarn is bigger.

